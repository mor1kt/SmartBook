[build]
  command = "npm run build -w apps/frontend"
  publish = "apps/frontend/dist"

[functions]
  # Просто указываем папку, Netlify сам поймет, что это TS и соберет их
  directory = "api"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/c/*"
  to = "/.netlify/functions/c/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
